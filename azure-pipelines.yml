trigger:
  - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  sqlServerName: '$(SQL_SERVER_NAME)'
  databaseName: '$(DATABASE_NAME)'
  sqlUsername: '$(SQL_USERNAME)'
  sqlPassword: '$(SQL_PASSWORD)'

steps:
- task: UseDotNet@2
  inputs:
    version: '6.x'
    includePreviewVersions: true

# Step 1: Deploy initial schema
- task: SqlDeployment@1
  inputs:
    ServerName: $(sqlServerName)
    DatabaseName: $(databaseName)
    SqlUsername: $(sqlUsername)
    SqlPassword: $(sqlPassword)
    SqlFile: $(Build.SourcesDirectory)/create_table.sql
    QueryTimeout: '60'

# Step 2: Apply schema update
- task: SqlDeployment@1
  inputs:
    ServerName: $(sqlServerName)
    DatabaseName: $(databaseName)
    SqlUsername: $(sqlUsername)
    SqlPassword: $(sqlPassword)
    SqlFile: $(Build.SourcesDirectory)/update_table.sql
    QueryTimeout: '60'

# Step 3: Validate schema update
- task: SqlQuery@1
  inputs:
    ServerName: $(sqlServerName)
    DatabaseName: $(databaseName)
    SqlUsername: $(sqlUsername)
    SqlPassword: $(sqlPassword)
    QueryType: 'Inline'
    Query: |
      -- Check if new columns exist in Movies table
      SELECT 
        COLUMN_NAME,
        DATA_TYPE
      FROM INFORMATION_SCHEMA.COLUMNS
      WHERE TABLE_NAME = 'Movies'
      AND COLUMN_NAME IN ('Director', 'Runtime', 'Language', 'StreamingAvailability');
    QueryTimeout: '60' 